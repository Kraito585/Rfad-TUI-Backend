steps:
  test:
    image: golang:1.25-alpine
    commands:
      - go mod download
      - go test -v ./...
    when:
      - event: push
        branch: main
        evaluate: 'not (CI_COMMIT_MESSAGE contains "[test]")'

  publish-image:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      registry: ghcr.io
      repo: ghcr.io/kraito585/rfad-tui-backend
      tags: latest
      username: Kraito585
      password:
        from_secret: github_token
    when:
      - event: push
        branch: main
        evaluate: 'not (CI_COMMIT_MESSAGE contains "[build]")'
## текст ради комита 
deploy:
    image: appleboy/drone-ssh
    settings:
      host:
        from_secret: deploy_host
      username: deployer
      port: 22
      key:
        from_secret: deploy_ssh_key
      script:
        - echo $GITHUB_TOKEN | sudo /home/docker/deploy.sh
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    when:
      - event: push
        branch: main
        evaluate: 'not (CI_COMMIT_MESSAGE contains "[deploy]")'

when:
  event: push
  branch: main