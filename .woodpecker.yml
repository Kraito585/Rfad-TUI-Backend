steps:
  test:
    image: golang:1.25-alpine
    labels:
      env: dev
    when:
      - event: [push, pull_request]
        branch: main
    commands:
      - go mod download
      - go test -v ./...

  publish-image:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    labels:
      env: dev
    settings:
      registry: ghcr.io
      repo: ghcr.io/kraito585/rfad-tui-backend
      tags: latest
      username: Kraito585
      password:
        from_secret: github_token

  deploy:
    image: docker:cli
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    labels:
      env: prod
    commands:
      - echo $GITHUB_TOKEN | docker login ghcr.io -u Kraito585 --password-stdin
      - cd /home/docker/app-code
      - docker compose pull api
      - docker compose up -d api
      - docker image prune -f
    when:
      branch: main
      event: push