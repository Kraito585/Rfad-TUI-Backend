steps:
  test:
    image: golang:1.25-alpine
    commands:
      - go mod download

  publish-image:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      registry: ghcr.io
      repo: ghcr.io/kraito585/rfad-tui-backend 
      tags: latest
      username: Kraito585
      password:
        from_secret: github_token

when:
  - event: pull_request
    branch: main
  - event: push
    branch: main