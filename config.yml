app:
  port: "7910"
  # Сохроняется в cfg можно использовать в коде
  is_prod: false
  # Отключение Cluster отлючит окружёные им функции но не трогает Kafka outbox_relay, state_replicator, task_processor
  # Это просто инструмет который по умолчанию ничего не делает
  cluster: false
  # Выдаётся черезманифест автоматически
  pod_id: 

security:
  # Клчюч шифрование данных в БД и Redis, должен быть 32 байта для AES-256
  master_key: "siMemhuQfTlfKXiFxmVvmQKVSqRELrzQ"

#core:jwt
jwt:
  enabled: true
  # Время жизни Access токена в минутах
  access_ttl: 10080
  
  # ПУТИ К КЛЮЧАМ
  # Для Auth-сервиса (который ВЫПУСКАЕТ токены) обязательно нужны оба ключа:
  private_key_path: "./config/certs/private.pem"
  public_key_path: "./config/certs/public.pem"
  
  # ВАЖНО: 
  # В других микросервисах (которые только ПРОВЕРЯЮТ токены)
  # поле private_key_path должно быть пустым ("") или вообще удалено,
  # а public_key_path должен указывать на публичный ключ!
#core:jwt:end

core: #не реализованно
  # Strict mode запрещает пробрасывать функции из неразрешенных пакетов
  # для перечисленных в modulse в него можно внести [handler, router, service, repository]
  # Context и cfg разрешен везде
  # Hanler позволен service, validation
  # Repository позволен pgx pool, redis pool, pkg
  # Router позволен hanler, Middleware
  # Service позволен pkg, repository
  # pkg позволен pgx pool, redis pool
  strict_mode: true
  modules:
    - handler
    - router
    - service
    - repository
    - pkg

cors:
  enabled: true

  # Разрешенные домены.
  # В dev-среде можно использовать "*", но лучше явно указывать порты локалхоста.
  allow_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "http://127.0.0.1:5173"
    - "http://localhost:7910"

  # Разрешенные HTTP-методы (если оставить пустым, Fiber подставит стандартные)
  allow_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
    - "PATCH"

  # Разрешенные заголовки
  allow_headers:
    - "Origin"
    - "Content-Type"
    - "Accept"
    - "Authorization"

  # Обязательно true, если ты используешь JWT в Cookies или Basic Auth!
  allow_credentials: true

postgresql:
  db_host: "localhost"
  db_port: "5432"
  db_name: "RFAD"
  user: "dev_user"
  password: "123456"

  # db_names:
  #   - "db-1"
  #   - "db-2"
  #   - "db-3"

redis:
  # Режим работы. Доступные варианты:
  # - "standalone" : Одиночный инстанс (для локальной разработки)
  # - "cluster" : Режим Redis Cluster (шардирование, умный роутинг)
  # - "master_replica" : Ручное разделение на 1 Master (для записи) и Replicas (для чтения)
  mode: "standalone"

  # Адреса мастер-нод (или адрес одиночного сервера)
  # В режиме standalone нужен только один. В режиме cluster перечисляем несколько.
  master_addrs:
    - "localhost:6379"
    # - "redis-node-2:6379" (пример для кластера)

  # Адреса реплик (Используется ТОЛЬКО если mode: "master_replica")
  replica_addrs:
    - "localhost:6380"

  password: "dev_secret_password"

  # Настройки пула соединений
  pool_size: 100 # Максимальное количество одновременных соединений (для высоких нагрузок)
  min_idle_conns: 10 # Сколько соединений держать всегда открытыми (чтобы не тратить время на handshake)

prometheus:
  enabled: false
  secure: true
  user: "prom_scraper"
  password: "v5mTsaqSgy+xBhX1trQIdjDN4foaESzHfN9JCgTVdes="
  service_name: "service_name"

jaeger:
  enabled: false
  service_name: "service_name"
  url: "localhost:4317"

s3:
  enabled: true
  
  # Для RustFS (локально или в Docker) используй http:// и свой IP/порт
  # Например: "http://192.168.0.13:9000" или имя контейнера "http://rustfs:9000"
  endpoint: "http://localhost:9000" 
  
  # Для Selectel это обычно ru-1. Для RustFS значение не критично, но должно быть заполнено
  region: "ru-1" 
  
  access_key: "admin"
  secret_key: "admin_secret"
  bucket: "kraito-local-bucket"
